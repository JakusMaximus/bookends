<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookends | Daily Word Challenge</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="game-container">
        <header>
            <h1>BOOKENDS</h1>
        </header>

        <div id="word-stack"></div>

        <div id="input-section">
            <input type="text" id="word-input" placeholder="Loading dictionary..." autocomplete="off" autofocus>
            <p id="message">Add a letter to the start or end to grow the word.</p>
        </div>

        <div id="controls">
            <button id="share-btn" style="display:none;">SHARE RESULT 📤</button>
        </div>
    </div>

    <script src="starters.js"></script>
    <script src="script.js"></script>

</body>
</html>
