<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookends | Daily Word Challenge</title>
    <link rel="stylesheet" href="style.css?v=302">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="game-container">
        <header>
            <h1>📖 BOOKENDS 📖</h1>
        </header>

        <div id="word-stack"></div>

        <div id="active-area">
            <div id="slot-prefix" class="slot" onclick="selectSlot('prefix')"></div>
            <div id="active-word-display" style="display:flex; gap:5px;"></div>
            <div id="slot-suffix" class="slot" onclick="selectSlot('suffix')"></div>
        </div>

        <p id="message">Loading...</p>

        <div id="tutorial-text">
            Add a letter to either end to make a new word. How long can you keep the chain going?
        </div>

        <div id="controls">
            <button id="share-btn">
                <span>Share Results</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left:8px;">
                    <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
                    <polyline points="16 6 12 2 8 6"></polyline>
                    <line x1="12" y1="2" x2="12" y2="15"></line>
                </svg>
            </button>
        </div>

        <div id="keyboard"></div>
    </div>

    <script src="starters.js"></script>
    <script src="script.js"></script>
</body>
</html>
